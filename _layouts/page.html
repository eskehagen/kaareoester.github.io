---
layout: default
---

<div class="container">
  <div class="page-content">
    {% if page.show_title != false %}
    <div class="section-header">
      <h1>{{ page.title }}</h1>
      {% if page.description %}
        <p class="lead">{{ page.description }}</p>
      {% endif %}
    </div>
    {% endif %}
    {{ content }}
  </div>
</div>
