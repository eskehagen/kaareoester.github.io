<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} · {{ site.description }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 155 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Source+Serif+4:ital,wght@0,400;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <nav class="site-nav" id="siteNav">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="site-title">
        <!-- Inline Ø logo mark -->
        <svg width="32" height="32" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#1a3a5c"/>
              <stop offset="100%" stop-color="#2d7a6e"/>
            </linearGradient>
          </defs>
          <circle cx="120" cy="120" r="110" fill="url(#lg)"/>
          <circle cx="120" cy="120" r="72" fill="url(#lg)"/>
          <circle cx="120" cy="120" r="48" fill="white"/>
          <line x1="66" y1="160" x2="174" y2="80" stroke="white" stroke-width="12" stroke-linecap="round"/>
          <circle cx="173" cy="80" r="9" fill="#2d7a6e"/>
        </svg>
        <span style="display:flex;flex-direction:column;line-height:1.1;">
          <span style="font-family:var(--font-serif);font-size:1.1rem;font-weight:700;color:var(--navy);letter-spacing:-0.01em;">Kaare Øster</span>
          <span style="font-family:var(--font-sans);font-size:0.62rem;font-weight:500;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;">Fagforfatter</span>
        </span>
      </a>

      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>

      <ul class="nav-links" id="navLinks">
        <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Hjem</a></li>
        <li><a href="{{ '/biografi/' | relative_url }}" {% if page.url contains 'biografi' %}class="active"{% endif %}>Biografi</a></li>
        <li><a href="{{ '/rejser/' | relative_url }}" {% if page.url contains 'rejser' %}class="active"{% endif %}>Rejser</a></li>
        <li><a href="{{ '/projekter/' | relative_url }}" {% if page.url contains 'projekter' %}class="active"{% endif %}>Projekter</a></li>
        <li><a href="{{ '/udgivelser/' | relative_url }}" {% if page.url contains 'udgivelser' %}class="active"{% endif %}>Udgivelser</a></li>
        <li><a href="{{ '/kontakt/' | relative_url }}" {% if page.url contains 'kontakt' %}class="active"{% endif %}>Kontakt</a></li>
      </ul>
    </div>
  </nav>

  <main>{{ content }}</main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-grid">
        <div style="display:flex;align-items:center;gap:1.25rem;">
          <!-- Footer logo (white version) -->
          <svg width="48" height="48" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;opacity:0.9;">
            <circle cx="120" cy="120" r="110" fill="rgba(255,255,255,0.12)"/>
            <circle cx="120" cy="120" r="72" fill="rgba(255,255,255,0.12)"/>
            <circle cx="120" cy="120" r="48" fill="rgba(26,58,92,1)"/>
            <line x1="66" y1="160" x2="174" y2="80" stroke="rgba(255,255,255,0.8)" stroke-width="12" stroke-linecap="round"/>
            <circle cx="173" cy="80" r="9" fill="#2d7a6e"/>
          </svg>
          <div>
            <div class="footer-name">Kaare Øster</div>
            <div class="footer-tagline">Fagforfatter · Rejser · Projekter · Udgivelser</div>
          </div>
        </div>
        <nav class="footer-nav">
          <a href="{{ '/biografi/' | relative_url }}">Biografi</a>
          <a href="{{ '/rejser/' | relative_url }}">Rejser</a>
          <a href="{{ '/udgivelser/' | relative_url }}">Udgivelser</a>
          <a href="{{ '/kontakt/' | relative_url }}">Kontakt</a>
        </nav>
      </div>
      <div class="footer-bottom">
        <a href="mailto:kaos@kaareoester.dk" style="color:rgba(255,255,255,0.42);">kaos@kaareoester.dk</a>
        &nbsp;·&nbsp; © 2025 Kaare Øster
      </div>
    </div>
  </footer>

  <script>
    var nav = document.getElementById('siteNav');
    window.addEventListener('scroll', function() {
      nav.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });
    document.getElementById('navToggle').addEventListener('click', function() {
      document.getElementById('navLinks').classList.toggle('open');
    });
  </script>

</body>
</html>
